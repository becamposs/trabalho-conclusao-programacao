# Pipeline Completa utilizando o trabalho de conclusão da disciplina anterior.

name: 'Pipeline Trabalho Final'

on: 

#Execução Manual
  workflow_dispatch:

#Execução Agendada
  schedule:
    - cron: '12 0 * * *' 
  
#Execução por Push
  push:
    branches:
      - main

jobs: 

  tests:
    
    runs-on: ubuntu-latest

    steps:

      - name: Clonando projeto
        uses: actions/checkout@v4
      
      - name: Instalando node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Instalando dependências
        run: npm ci

      - name: Executando testes
        run: npm run test:report

      - name: Salvando relatório de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./mochawesome-report
          name: relatorio-de-testes